<main>

    <div class="sec-head">

<script src="/js/site.js"></script>
<script>
(async ()=>{
  try{
    const data = (await loadNews()).sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById("news-list").innerHTML = data.map(n=>`
      <li class="news-item">
        <time datetime="${n.date}">${n.date.replaceAll("-",".")}</time>
        <span class="news-cat">${n.category}</span>
        <span class="n-title">${n.link && n.link !== "#" ? `<a href="${n.link}">${n.title}</a>` : n.title}</span>
      </li>`).join("") || '<li class="empty-note">お知らせはまだありません。</li>';
  }catch(err){
    console.error(err);
    document.getElementById("news-list").innerHTML =
      '<li class="news-item"><span class="n-title">ニュースを読み込めませんでした。</span></li>';
  }
})();
</script>
