<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWS | 銀幕一楼とTIMECAFE</title>
<meta name="description" content="銀幕一楼とTIMECAFEの最新ニュース・お知らせ。">
<meta property="og:type" content="website">
<meta property="og:title" content="NEWS | 銀幕一楼とTIMECAFE">
<meta property="og:url" content="https://ginmakuichiro.net/news">
<meta property="og:image" content="https://ginmakuichiro.net/img/ogp.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/favicon.png?v=2" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/site.css?v=6">
<style>
.news-article{padding:26px 4px;border-bottom:1px solid var(--line)}
.news-article .meta{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.news-article time{font-size:.82rem;color:var(--ink-soft);font-family:'Shippori Mincho B1',serif}
.news-article h2{font-family:'Shippori Mincho B1',serif;font-size:1.2rem;font-weight:700;line-height:1.5;margin-bottom:10px}
.news-article .body{font-size:.92rem;white-space:pre-wrap;word-break:break-word}
.news-article .body a{color:var(--curtain);word-break:break-all}
.news-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
.news-gallery a{display:block}
.news-gallery img{width:100%;height:auto;border-radius:4px;border:1px solid var(--line);display:block}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">銀幕一楼とTIMECAFE<small>OFFICIAL WEBSITE</small></a>
    <nav aria-label="メインメニュー">
      <ul>
        <li><a href="/schedule">SCHEDULE</a></li>
        <li><a href="/news" aria-current="page">NEWS</a></li>
        <li><a href="/profile">PROFILE</a></li>
        <li><a href="/#video">VIDEO</a></li>
        <li><a href="https://timecafe.thebase.in" target="_blank" rel="noopener">STORE ↗</a></li>
        <li><a href="/#contact">CONTACT</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <section id="news">
    <div class="sec-head">
      <h2>NEWS</h2><span class="jp">ニュース</span>
    </div>
    <div id="news-list"></div>
  </section>
</main>

<footer>
  <div class="sns">
    <a href="https://x.com/Ginmaku_Jimu" target="_blank" rel="noopener">X (Twitter)</a>
    <a href="https://www.youtube.com/@timecafe089542" target="_blank" rel="noopener">YouTube</a>
    <a href="https://www.instagram.com/ginmakuichiro_official/" target="_blank" rel="noopener">Instagram</a>
    <a href="https://timecafe.thebase.in" target="_blank" rel="noopener">STORE</a>
  </div>
  © 2026 銀幕一楼とTIMECAFE
</footer>

<script src="/js/site.js?v=2"></script>
<script>
(async ()=>{
  try{
    const data = (await loadNews()).sort((a,b)=>b.date.localeCompare(a.date));
    document.getElementById("news-list").innerHTML = data.map(n=>`
      <article class="news-article" id="${n.id || ""}">
        <div class="meta">
          <time datetime="${n.date}">${n.date.replaceAll("-",".")}</time>
          <span class="news-cat">${escHtml(n.category)}</span>
        </div>
        <h2>${escHtml(n.title)}</h2>
        ${n.body ? `<div class="body">${linkify(n.body)}</div>`
          : (n.link && n.link !== "#" ? `<div class="body"><a href="${escHtml(n.link)}" target="_blank" rel="noopener">${escHtml(n.link)}</a></div>` : "")}
        ${(n.images||[]).length ? `<div class="news-gallery">${n.images.map((id,i)=>`<a href="https://admin.ginmakuichiro.net/img/${id}" target="_blank" rel="noopener"><img src="https://admin.ginmakuichiro.net/img/${id}" alt="${escHtml(n.title)} 画像${i+1}" loading="lazy"></a>`).join("")}</div>` : ""}
      </article>`).join("") || '<p class="empty-note">お知らせはまだありません。</p>';
    if(location.hash) document.getElementById(location.hash.slice(1))?.scrollIntoView();
  }catch(err){
    console.error(err);
    document.getElementById("news-list").innerHTML = '<p class="empty-note">ニュースを読み込めませんでした。</p>';
  }
})();
</script>
</body>
</html>
